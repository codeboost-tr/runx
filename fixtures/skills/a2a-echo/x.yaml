skill: a2a-echo

runners:
  fixture-a2a:
    type: a2a
    agent_card_url: fixture://echo-agent
    agent_identity: echo-agent
    task: echo
    arguments:
      message: "{{message}}"
    timeout_seconds: 1
    inputs:
      message:
        type: string
        required: true
        description: Message to echo through the fixture A2A agent.
