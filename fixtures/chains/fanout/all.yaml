name: fanout-all-success
owner: runx
fanout:
  groups:
    advisors:
      strategy: all
      on_branch_failure: halt
steps:
  - id: market
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/json-output.md
    inputs:
      recommendation: go
  - id: risk
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/json-output.md
    inputs:
      risk_score: 0.2
  - id: finance
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/json-output.md
    inputs:
      budget: approved
  - id: synthesize
    skill: ../../skills/echo.md
    context:
      message: finance.budget
