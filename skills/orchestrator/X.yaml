skill: orchestrator
version: "0.1.0"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  orchestrator:
    default: true
    type: agent-task
    agent: operator
    task: orchestrator
    outputs:
      run_plan: object
    artifacts:
      wrap_as: run_plan_packet
      packet: runx.run_plan.v1
    inputs:
      objective:
        type: string
        required: true
        description: "The goal to route onto existing catalog skills, in plain language."
      available_skills:
        type: json
        required: false
        description: "Catalog refs the orchestrator may choose from (skill id plus version or digest, with declared purpose). When omitted, route over the resolvable catalog and name any gap as a blocker."
      constraints:
        type: json
        required: false
        description: "Bounds the plan must respect: budget, the parent scope grant, allowed gates, and deadlines. No step may exceed the parent grant."
