name: routes-refund-then-notify
kind: skill
target: ..
runner: orchestrator
inputs:
  objective: Refund the customer for charge rcpt_9f21, then notify them the refund is on its way.
  available_skills:
    - ref: refund@0.1.0
      purpose: Govern one refund linked to a sealed original charge receipt.
    - ref: send-as@0.1.0
      purpose: Govern a message sent on behalf of a principal.
  constraints:
    budget_usd: 200
    parent_scope:
      - wallet:refund<=$200
      - net:allowlist:api.stripe.com
      - send:channel:email
    allowed_gates:
      - approval
      - preflight
caller:
  answers:
    agent_task.orchestrator.output:
      run_plan:
        objective: Refund charge rcpt_9f21, then send the customer a refund-confirmation email.
        steps:
          - id: s1_refund
            skill_ref: refund@0.1.0
            scope:
              - wallet:refund<=$200
              - net:allowlist:api.stripe.com
            inputs_ref:
              original_charge_receipt: receipt:rcpt_9f21
            gates: approval
            expected_receipt: runx.receipt.v1
          - id: s2_notify
            skill_ref: send-as@0.1.0
            scope:
              - send:channel:email
            inputs_ref:
              principal: principal:acct_merchant
              audience: handle:customer_of:rcpt_9f21
              content_ref: digest:sha256:9c1d4b7a
              refund_evidence: step:s1_refund.output.refund_receipt_ref
            gates: approval
            expected_receipt: runx.receipt.v1
        topology:
          - from: s1_refund
            to: s2_notify
        budget:
          ceiling_usd: 200
          allocations:
            s1_refund: 200
            s2_notify: 0
        blockers: []
        status: routed
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
metadata:
  public_skill: orchestrator
  source_case: routes-refund-then-notify
  source: skills-fixture
