skill: open-meteo-weather-forecast-air-quality
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: internal
  role: graph-stage
  part_of:
    - runx/open-meteo-weather-forecast

runners:
  air_quality:
    default: true
    type: http
    url: https://air-quality-api.open-meteo.com/v1/air-quality?latitude={latitude}&longitude={longitude}&current=pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,sulphur_dioxide,ozone,european_aqi,us_aqi&timezone=auto
    method: GET
    artifacts:
      wrap_as: open_meteo_air_quality_evidence
    headers:
      accept: application/json
    inputs:
      latitude:
        type: string
        required: true
        description: Decimal latitude.
      longitude:
        type: string
        required: true
        description: Decimal longitude.
