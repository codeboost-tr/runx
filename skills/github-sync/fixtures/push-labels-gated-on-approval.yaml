name: push-labels-gated-on-approval
kind: skill
target: ..
runner: github-sync
inputs:
  repo: runxhq/runx
  direction: push
  scope: write
  resources:
    kind: issues
    filters:
      refs:
        - runxhq/runx#412
        - runxhq/runx#418
caller:
  answers:
    agent_task.github-sync.output:
      sync_plan:
        decision: blocked
        repo: runxhq/runx
        direction: push
        resources_touched:
          - kind: issue
            ref: runxhq/runx#412
          - kind: issue
            ref: runxhq/runx#418
        diff_summary:
          - ref: runxhq/runx#412
            op: add_label
            digest: sha256:9f1c0a7e
          - ref: runxhq/runx#418
            op: close
            digest: sha256:2b4d8c10
        scope_used: repo:write
        gates:
          approval_required: true
        blockers:
          - awaiting human approval for repo:write push
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
metadata:
  public_skill: github-sync
  source_case: push-labels-gated-on-approval
  source: skills-fixture
