name: harden-batch-job
kind: skill
target: ..
runner: sandbox-harden
inputs:
  workload:
    image_digest: "sha256:1f4c2b9e7a3d5c0f8e1a6b4d2c9f0e7a5b3d1c8f6e4a2b0d9c7f5e3a1b8d6c4f2"
    class: batch job
  threat_context: processes untrusted user uploads, no inbound network
  baseline: docker default seccomp, all caps, open egress, writable root
caller:
  answers:
    agent_task.sandbox-harden.output:
      hardening_profile:
        decision: ready
        workload:
          ref_form: image_digest
          image_digest: "sha256:1f4c2b9e7a3d5c0f8e1a6b4d2c9f0e7a5b3d1c8f6e4a2b0d9c7f5e3a1b8d6c4f2"
          class: batch job
        seccomp:
          default: deny
          allowed_syscalls:
            - read
            - write
            - openat
            - close
            - fstat
            - lseek
            - mmap
            - munmap
            - brk
            - clone
            - execve
            - wait4
            - exit_group
        dropped_caps:
          - CAP_SYS_ADMIN
          - CAP_NET_RAW
          - CAP_NET_BIND_SERVICE
          - CAP_SYS_PTRACE
          - CAP_SYS_MODULE
          - CAP_DAC_OVERRIDE
          - CAP_SETUID
          - CAP_SETGID
          - CAP_CHOWN
          - CAP_MKNOD
        egress:
          mode: none
          hosts: []
        filesystem:
          readonly: true
          writable_paths:
            - /tmp/work
        residual_risk:
          level: low
          reason: A compromised job can still consume CPU and fill /tmp/work to its quota; it cannot reach the network, escalate privilege, or write outside scratch.
        rationale: >-
          Caps dropped to none because a batch job that only reads uploads
          and writes scratch needs no privileged operation. Egress set to
          none from the no-inbound-no-outbound threat context. Root made
          read-only with a single justified scratch mount at /tmp/work.
          Seccomp allow set covers file I/O, memory, and process control
          but excludes ptrace, mount, and raw socket families. The syscall
          set is assumed from the batch-job class rather than an observed
          trace, so a trace under audit seccomp would raise confidence
          without widening the posture. Posture is strictly tighter than
          the supplied baseline on every axis.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
metadata:
  public_skill: sandbox-harden
  source_case: harden-batch-job
  source: skills-fixture
